<!DOCTYPE html>
<html>
<head>
  <title>Contact Form</title>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      padding: 30px;
    }
    input, textarea {
      width: 300px;
      padding: 10px;
      margin: 10px 0;
      display: block;
    }
    button {
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Contact Form</h2>

<input type="text" id="name" placeholder="Enter Name">
<input type="email" id="email" placeholder="Enter Email">
<textarea id="message" placeholder="Enter Message"></textarea>

<button onclick="submitData()">Submit</button>

<p id="status"></p>

<script>
  // 1. CONNECT SUPABASE
  const supabaseUrl = "https://uewdyxcqrdmsjjqsnnnh.supabase.co";
  const supabaseKey = "sb_publishable_3w9AaVgKZVk7aGqKLfkP5g_xsjIoWD5";

  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // 2. SUBMIT FUNCTION
  async function submitData() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;

    const { data, error } = await supabase
      .from("contacts")   // 👈 TABLE NAME
      .insert([
        { name: name, email: email, message: message }
      ]);

    if (error) {
      document.getElementById("status").innerText = "❌ Error: " + error.message;
      console.log(error);
    } else {
      document.getElementById("status").innerText = "✅ Data saved successfully!";
    }
  }
</script>

</body>
</html>
